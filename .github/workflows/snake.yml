name: generate snake

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          # Tessera palette: blood snake, bone+ink dots
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=%23c41e26&color_dots=%2307070a%2C%23797368%2C%23b9b3a4%2C%23ece6d8%2C%23c41e26
            dist/snake-light.svg?palette=github-light&color_snake=%23c41e26&color_dots=%23ece6d8%2C%23b9b3a4%2C%23797368%2C%234a453d%2C%23c41e26

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
