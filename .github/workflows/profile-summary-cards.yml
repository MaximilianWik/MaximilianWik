name: GitHub Profile Summary Cards

# Generates static SVG cards (profile details, stats, repos-per-language,
# most-commit-language, productive-time) committed to the repo. Reliable
# replacement for the github-readme-stats.vercel.app service which keeps
# getting paused due to rate-limit overruns.

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: build
    steps:
      - uses: actions/checkout@v4

      - name: generate cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 1
          THEME: 'transparent'
          AUTO_PUSH: 'false'

      - name: recolor stats card to Tessera palette
        run: |
          f=profile-summary-card-output/transparent/3-stats.svg
          if [ -f "$f" ]; then
            # Step 1: theme colours -> Tessera palette
            #   #006AFF (title)         -> #c41e26 (blood)
            #   #0579C3 (icons)         -> #c41e26 (blood)
            #   #417E87 (labels+values) -> #ece6d8 (bone, temporarily)
            sed -i \
              -e 's/#006AFF/#c41e26/g' \
              -e 's/#0579C3/#c41e26/g' \
              -e 's/#417E87/#ece6d8/g' \
              "$f"
            # Step 2: flip the values back to blood. The values are emitted
            # at x="130" (the labels are at x="21"), so we can target them
            # specifically with a regex on the <text> element.
            sed -i -E 's|(<text x="130"[^>]*fill: )#ece6d8|\1#c41e26|g' "$f"
            echo "recolored $f"
          else
            echo "WARN: $f not found"
          fi

      - name: commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add profile-summary-card-output
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: update profile summary cards (Tessera palette)"
            git push
          fi
