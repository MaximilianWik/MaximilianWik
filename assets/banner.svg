<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="Maximilian Wikstrom">
  <defs>
    <!-- Scanline overlay: very subtle horizontal lines, the Tessera diagnostic-terminal feel -->
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#000000"/>
      <rect y="2" width="3" height="1" fill="#ffffff" opacity="0.012"/>
    </pattern>
    <!-- Soft red glow at the top, as in styles.css body background -->
    <radialGradient id="halo" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#c41e26" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#c41e26" stop-opacity="0"/>
    </radialGradient>
    <!-- Crisp QR-glyph favicon, scaled up -->
    <symbol id="mark" viewBox="0 0 7 7">
      <rect width="7" height="7" fill="#000"/>
      <rect x="1" y="1" width="5" height="5" fill="#ece6d8"/>
      <rect x="2" y="2" width="3" height="3" fill="#000"/>
    </symbol>
  </defs>

  <!-- INK GROUND -->
  <rect width="1200" height="340" fill="#000000"/>
  <rect width="1200" height="340" fill="url(#halo)"/>
  <rect width="1200" height="340" fill="url(#scan)"/>

  <!-- CORNER BRACKETS (Tessera CornerBrackets motif) -->
  <g stroke="#c41e26" stroke-width="2" fill="none">
    <polyline points="20,40 20,20 50,20"/>
    <polyline points="1180,40 1180,20 1150,20"/>
    <polyline points="20,300 20,320 50,320"/>
    <polyline points="1180,300 1180,320 1150,320"/>
  </g>

  <!-- TOP META LINE: terminal slug -->
  <g font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#797368" letter-spacing="0.18em">
    <text x="60" y="58">// PROFILE :: MAXIMILIAN_WIKSTROM</text>
    <text x="1140" y="58" text-anchor="end" fill="#c41e26">[ ONLINE ]</text>
  </g>

  <!-- BIG TITLE -->
  <g font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="800" letter-spacing="-0.04em">
    <text x="60" y="170" font-size="92" fill="#ece6d8">MAXIMILIAN</text>
    <text x="60" y="252" font-size="92" fill="#c41e26">WIKSTRÖM</text>
  </g>

  <!-- TYPED SUBTITLE WITH BLINKING CURSOR -->
  <g font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" letter-spacing="0.04em">
    <text x="60" y="295" fill="#b9b3a4">$ stockholm.se &#8226; full-stack &#8226; building things that outlast me</text>
    <rect x="700" y="280" width="11" height="20" fill="#c41e26">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- QR MARK ON RIGHT (with quiet pulse) -->
  <g transform="translate(980 110)">
    <use href="#mark" width="140" height="140"/>
    <rect x="-6" y="-6" width="152" height="152" fill="none" stroke="#c41e26" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="70" y="174" text-anchor="middle"
          font-family="JetBrains Mono, ui-monospace, monospace" font-size="11"
          fill="#797368" letter-spacing="0.3em">TESSERA</text>
  </g>

  <!-- BOTTOM RULE WITH STATUS DOTS -->
  <line x1="60" y1="320" x2="1140" y2="320" stroke="#1d1d27" stroke-width="1"/>
</svg>
